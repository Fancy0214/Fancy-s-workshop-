<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思维模型工具箱 | Thinking Models</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2B6CB0;--primary-light:#3182CE;--primary-dark:#2C5282;
  --primary-bg:#EBF4FF;--primary-bg2:#BEE3F8;
  --bg:#F7F8FC;--white:#FFFFFF;--text:#1A202C;--text-secondary:#4A5568;--text-light:#718096;
  --border:#E2E8F0;--shadow:0 4px 24px rgba(43,108,176,0.08);--shadow-lg:0 8px 40px rgba(43,108,176,0.12);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --cat-strategy:#2B6CB0;--cat-decision:#805AD5;--cat-cognition:#DD6B20;
  --cat-problem:#38A169;--cat-efficiency:#E53E3E;--cat-system:#319795;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:#fff;padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(43,108,176,0.2)}
.header-inner{max-width:1280px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:16px}
.back-link{color:rgba(255,255,255,.85);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);transition:all .2s}
.back-link:hover{background:rgba(255,255,255,.22);color:#fff}
.header-title{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.header-subtitle{font-size:13px;opacity:.8;font-weight:300;margin-top:2px}
.header-badge{background:rgba(255,255,255,.2);backdrop-filter:blur(8px);padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500}
.header-badge span{font-weight:700}

/* Search */
.search-section{max-width:1280px;margin:0 auto;padding:24px 24px 0}
.search-box{position:relative;max-width:520px}
.search-box input{width:100%;padding:14px 20px 14px 48px;border:2px solid var(--border);border-radius:var(--radius);font-size:15px;font-family:inherit;background:var(--white);transition:all .2s;outline:none}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(43,108,176,0.1)}
.search-box input::placeholder{color:var(--text-light)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:18px}

/* Filters */
.filter-section{max-width:1280px;margin:0 auto;padding:20px 24px}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:14px;font-weight:600;color:var(--text-secondary);margin-right:4px}
.filter-btn{padding:8px 18px;border-radius:20px;border:2px solid var(--border);background:var(--white);color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.fav-toggle{margin-left:auto;display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:20px;border:2px solid var(--border);background:var(--white);color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.fav-toggle:hover{border-color:#E53E3E;color:#E53E3E}
.fav-toggle.active{background:#FFF5F5;color:#E53E3E;border-color:#E53E3E}
.fav-toggle .star{font-size:15px}

/* Stats */
.stats-bar{max-width:1280px;margin:0 auto;padding:0 24px 16px;display:flex;gap:20px;font-size:13px;color:var(--text-light)}
.stats-bar strong{color:var(--primary);font-weight:600}

/* Grid */
.cards-grid{max-width:1280px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px}

/* Card */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:all .3s ease;position:relative;animation:cardIn .4s ease both}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.card.hidden{display:none}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card-header{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
.card-title-group{flex:1}
.card-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.3px;line-height:1.3}
.card-icon{font-size:28px;margin-bottom:4px;display:block}
.card-cat{display:inline-block;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;color:#fff;margin-top:8px}
.cat-strategy{background:var(--cat-strategy)}.cat-decision{background:var(--cat-decision)}
.cat-cognition{background:var(--cat-cognition)}.cat-problem{background:var(--cat-problem)}
.cat-efficiency{background:var(--cat-efficiency)}.cat-system{background:var(--cat-system)}

.fav-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;transition:all .2s;filter:grayscale(1);opacity:.4}
.fav-btn.active{filter:none;opacity:1;animation:popStar .3s ease}
.fav-btn:hover{opacity:.8;transform:scale(1.15)}
@keyframes popStar{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

.card-body{padding:16px 24px 24px}
.card-concept{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:16px;border-left:3px solid var(--primary-bg2);padding-left:14px}

.card-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.card-scenarios{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.scenario-tag{padding:4px 10px;border-radius:6px;font-size:12px;background:var(--primary-bg);color:var(--primary);font-weight:500}

.card-steps{list-style:none;padding:0}
.card-steps li{position:relative;padding:8px 0 8px 36px;font-size:13.5px;color:var(--text-secondary);line-height:1.6}
.card-steps li::before{content:attr(data-step);position:absolute;left:0;top:8px;width:24px;height:24px;border-radius:50%;background:var(--primary-bg);color:var(--primary);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* Expand toggle */
.card-expand-btn{display:block;width:100%;padding:12px;background:var(--bg);border:none;border-top:1px solid var(--border);color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.card-expand-btn:hover{background:var(--primary-bg)}
.card-expand-btn .arrow{display:inline-block;transition:transform .3s;margin-left:4px}
.card-expand-btn.expanded .arrow{transform:rotate(180deg)}

.card-detail{max-height:0;overflow:hidden;transition:max-height .4s ease}
.card-detail.open{max-height:600px}

/* No results */
.no-results{text-align:center;padding:80px 24px;color:var(--text-light)}
.no-results .emoji{font-size:48px;margin-bottom:16px}
.no-results h3{font-size:20px;color:var(--text);margin-bottom:8px}

/* Footer */
.footer{text-align:center;padding:40px 24px;color:var(--text-light);font-size:13px;border-top:1px solid var(--border);background:var(--white)}

/* Responsive */
@media(max-width:768px){
  .cards-grid{grid-template-columns:1fr;gap:16px;padding:0 16px 40px}
  .header-inner{padding:12px 16px}
  .header-title{font-size:18px}
  .search-section,.filter-section,.stats-bar{padding-left:16px;padding-right:16px}
  .filter-btn{padding:6px 14px;font-size:12px}
  .fav-toggle{padding:6px 14px;font-size:12px}
  .card{border-radius:var(--radius-sm)}
}
@media(max-width:420px){
  .header-badge{display:none}
  .filter-label{display:none}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <a href="../fancy-workshop.html" class="back-link">← 返回主页</a>
      <div>
        <div class="header-title">🧠 思维模型工具箱</div>
        <div class="header-subtitle">Mental Models Toolkit</div>
      </div>
    </div>
    <div class="header-badge">共 <span id="totalCount">0</span> 个模型</div>
  </div>
</header>

<section class="search-section">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索思维模型名称、概念、应用场景…" autocomplete="off">
  </div>
</section>

<section class="filter-section">
  <div class="filter-bar">
    <span class="filter-label">分类：</span>
    <button class="filter-btn active" data-cat="all">全部</button>
    <button class="filter-btn" data-cat="strategy">🎯 战略分析</button>
    <button class="filter-btn" data-cat="decision">⚖️ 决策工具</button>
    <button class="filter-btn" data-cat="cognition">🧩 认知升级</button>
    <button class="filter-btn" data-cat="problem">🔧 问题解决</button>
    <button class="filter-btn" data-cat="efficiency">⚡ 效率优化</button>
    <button class="filter-btn" data-cat="system">🌐 系统思维</button>
    <button class="fav-toggle" id="favToggle"><span class="star">☆</span> 我的收藏</button>
  </div>
</section>

<div class="stats-bar" id="statsBar">
  显示 <strong id="visibleCount">0</strong> 个模型
</div>

<main class="cards-grid" id="cardsGrid"></main>

<div class="no-results" id="noResults" style="display:none">
  <div class="emoji">🔍</div>
  <h3>没有找到匹配的思维模型</h3>
  <p>试试其他关键词或清除筛选条件</p>
</div>

<footer class="footer">思维模型工具箱 — 用更好的思维框架，做更好的决策</footer>

// --- Render ---
const grid = document.getElementById('cardsGrid');
const searchInput = document.getElementById('searchInput');
const statsBar = document.getElementById('statsBar');
const noResults = document.getElementById('noResults');
const favToggle = document.getElementById('favToggle');

let favorites = JSON.parse(localStorage.getItem('thinking-models-fav') || '[]');
let activeCat = 'all';
let showFavOnly = false;

function saveFav(){ localStorage.setItem('thinking-models-fav', JSON.stringify(favorites)); }

function renderCards(){
  const q = searchInput.value.trim().toLowerCase();
  let html = '';
  let visible = 0;

  MODELS.forEach((m, idx) => {
    const matchCat = activeCat === 'all' || m.category === activeCat;
    const matchFav = !showFavOnly || favorites.includes(m.id);
    const matchSearch = !q ||
      m.name.toLowerCase().includes(q) ||
      m.concept.toLowerCase().includes(q) ||
      m.scenarios.some(s => s.toLowerCase().includes(q)) ||
      m.catLabel.includes(q);

    if(!matchCat || !matchFav || !matchSearch){
      html += `<div class="card hidden" data-id="${m.id}"></div>`;
      return;
    }
    visible++;
    const isFav = favorites.includes(m.id);
    html += `
      <div class="card" data-id="${m.id}" style="animation-delay:${idx*0.04}s">
        <div class="card-header">
          <div class="card-title-group">
            <span class="card-icon">${m.icon}</span>
            <div class="card-title">${m.name}</div>
            <span class="card-cat ${m.catClass}">${m.catLabel}</span>
          </div>
          <button class="fav-btn ${isFav?'active':''}" data-id="${m.id}" title="${isFav?'取消收藏':'收藏'}">${isFav?'★':'☆'}</button>
        </div>
        <div class="card-body">
          <div class="card-concept">${m.concept}</div>
          <div class="card-section-title">📋 应用场景</div>
          <div class="card-scenarios">${m.scenarios.map(s=>`<span class="scenario-tag">${s}</span>`).join('')}</div>
          <div class="card-detail" id="detail-${m.id}">
            <div class="card-section-title">📝 使用步骤</div>
            <ol class="card-steps">${m.steps.map((s,i)=>`<li data-step="${i+1}">${s}</li>`).join('')}</ol>
          </div>
        </div>
        <button class="card-expand-btn" data-target="detail-${m.id}">展开使用步骤 <span class="arrow">▼</span></button>
      </div>`;
  });

  grid.innerHTML = html;
  document.getElementById('totalCount').textContent = MODELS.length;
  document.getElementById('visibleCount').textContent = visible;
  noResults.style.display = visible === 0 ? 'block' : 'none';
  statsBar.style.display = visible === 0 ? 'none' : 'flex';
}

// --- Events ---
grid.addEventListener('click', e => {
  // Fav
  const favBtn = e.target.closest('.fav-btn');
  if(favBtn){
    const id = favBtn.dataset.id;
    if(favorites.includes(id)){
      favorites = favorites.filter(f=>f!==id);
    } else {
      favorites.push(id);
    }
    saveFav();
    renderCards();
    return;
  }
  // Expand
  const expandBtn = e.target.closest('.card-expand-btn');
  if(expandBtn){
    const target = document.getElementById(expandBtn.dataset.target);
    target.classList.toggle('open');
    expandBtn.classList.toggle('expanded');
    expandBtn.innerHTML = target.classList.contains('open')
      ? '收起使用步骤 <span class="arrow">▼</span>'
      : '展开使用步骤 <span class="arrow">▼</span>';
  }
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    renderCards();
  });
});

favToggle.addEventListener('click', () => {
  showFavOnly = !showFavOnly;
  favToggle.classList.toggle('active', showFavOnly);
  favToggle.querySelector('.star').textContent = showFavOnly ? '★' : '☆';
  renderCards();
});

let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderCards, 200);
});

renderCards();
</script>
